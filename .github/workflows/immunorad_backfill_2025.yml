name: ImmunoRad one-time backfill (since 2025-01-01)

on:
  workflow_dispatch: {}  # manual trigger only — this is a one-off, not scheduled

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run PubMed backfill since 2025-01-01 (by publication date)
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python living-search/scripts/pubmed_search.py --since 2025-01-01 --datetype pdat

      - name: Commit updated data
        run: |
          git config user.name "living-search-bot"
          git config user.email "actions@users.noreply.github.com"
          git add living-search/data/
          git diff --cached --quiet || git commit -m "One-time backfill from 2025-01-01"
          git push
