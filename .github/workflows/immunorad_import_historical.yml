name: ImmunoRad import historical vintages (2025 + 2026)

on:
  workflow_dispatch: {}  # manual trigger only, one-off

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Import historical PubMed + Embase vintages
        run: |
          python living-search/scripts/import_historical.py \
            living-search/data/historical_imports/Pubmed_2025_CSV.csv \
            living-search/data/historical_imports/Pubmed_2026_CSV.csv \
            living-search/data/historical_imports/Embase_Search_2025.csv \
            living-search/data/historical_imports/Embase_Search_2026.csv

      - name: Commit updated data
        run: |
          git config user.name "living-search-bot"
          git config user.email "actions@users.noreply.github.com"
          git add living-search/data/archive.json living-search/data/state.json
          git diff --cached --quiet || git commit -m "Import historical 2025+2026 search vintages"
          git push
